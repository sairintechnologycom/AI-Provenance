trigger:
  - main

pool:
  vmImage: ubuntu-latest

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '20.x'
    displayName: 'Install Node.js'

  - script: |
      npm ci
    displayName: 'Install dependencies for AI Provenance'

  - script: |
      # If using custom trailer key, set it as an env variable:
      # export TRAILER_KEY="My-Custom-Trailer"
      node src/azure/index.js
    displayName: 'Run AI Provenance Detection'
    env:
      # These are default ADO variables that our adapter will read automatically
      BUILD_SOURCEVERSION: $(Build.SourceVersion)
      SYSTEM_DEFAULTWORKINGDIRECTORY: $(System.DefaultWorkingDirectory)
