version: '3.8'

services:
  # Managed Database
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-mergebrief}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-mergebrief}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mergebrief -d mergebrief"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Database Setup & Migrations
  setup:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${DB_USER:-mergebrief}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-mergebrief}?schema=public
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy && npx prisma db seed"

  # MergeBrief Backend Service
  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-mergebrief}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-mergebrief}?schema=public
      NODE_ENV: production
      PORT: 3000
    env_file:
      - .env
    depends_on:
      setup:
        condition: service_completed_successfully

  # MergeBrief Dashboard
  dashboard:
    build:
      context: .
      dockerfile: web/Dockerfile
    restart: always
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-mergebrief}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-mergebrief}?schema=public
      NODE_ENV: production
      BACKEND_API_URL: http://backend:3000
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3001}
      PORT: 3001
    env_file:
      - .env
    depends_on:
      setup:
        condition: service_completed_successfully

volumes:
  postgres_data:
